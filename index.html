<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PIZZARIA FOLHARI - V6</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    
    <style>
        :root { --p: #e63946; --bg: #0b111a; --card: #161d29; --txt: #ffffff; --sub: #8b97a8; --w: #25d366; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 10px 10px 100px 10px; }
        .main { max-width: 500px; margin: auto; }

        input, select, textarea { 
            width: 100%; padding: 16px; margin: 8px 0; border: 1px solid #2d3748; 
            border-radius: 14px; background: #1a202c; color: white; font-size: 16px; outline: none; box-sizing: border-box;
        }

        .tabs { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab-btn { padding: 12px 20px; border: none; border-radius: 25px; background: var(--card); color: var(--sub); font-weight: bold; cursor: pointer; white-space: nowrap; }
        .tab-btn.active { background: var(--p); color: white; }

        .content { display: none; }
        .content.active { display: block; }

        .card-item { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--p); }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .btn-p { background: var(--p); color: white; }
        .btn-zap { background: var(--w); color: white; margin-top: 15px; }

        .footer-total { position: fixed; bottom: 0; left: 0; right: 0; background: #161d29; padding: 15px 20px; border-top: 3px solid var(--p); display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .total-price { color: var(--p); font-size: 24px; font-weight: bold; }
        pre { white-space: pre-wrap; font-family: inherit; margin: 0; font-size: 14px; }
        .borda-box { background: #1a202c; padding: 12px; border-radius: 12px; margin: 10px 0; border: 1px dashed var(--sub); }
    </style>
</head>
<body>

<div class="main">
    <h2 style="text-align:center;">🍕 <span style="color:var(--p)">Pizzaria</span> Folhari</h2>

    <div class="tabs">
        <button class="tab-btn active" onclick="setor(event, 's-pedido')">Pedido</button>
        <button class="tab-btn" onclick="setor(event, 's-pizzas')">Pizzas</button>
        <button class="tab-btn" onclick="setor(event, 's-bordas')">Bordas</button>
        <button class="tab-btn" onclick="setor(event, 's-refris')">Bebidas</button>
        <button class="tab-btn" onclick="setor(event, 's-entregas')">Taxas</button>
    </div>

    <div id="s-pedido" class="content active">
        <input list="list-p" id="item_pizza" placeholder="Pizza (ex: 2x Calabresa)" oninput="atualizarBordas(); calcularTotal()" autocomplete="off" spellcheck="false">
        <div id="container-bordas"></div>
        <input list="list-r" id="item_refri" placeholder="Bebidas..." oninput="calcularTotal()" autocomplete="off" spellcheck="false">
        <input type="text" id="id_cliente" placeholder="Nome do Cliente" autocomplete="off" spellcheck="false">
        <select id="p-tipo" onchange="toggleEntrega(); calcularTotal()">
            <option value="entrega">🚀 Entrega</option>
            <option value="local">🏠 Balcão</option>
        </select>
        <div id="area-bairro"><select id="p-taxa-bairro" onchange="calcularTotal()"></select></div>
        <textarea id="p-obs" rows="2" placeholder="Observações..."></textarea>
        <button class="btn btn-p" onclick="lancarPedido()">🔥 Finalizar Pedido</button>
        <div id="lista-pedidos" style="margin-top:20px"></div>
    </div>

    <div id="s-pizzas" class="content">
        <input id="cp-n" placeholder="Sabor" autocomplete="off"><input type="number" id="cp-v" placeholder="Preço R$">
        <button class="btn btn-p" onclick="cad('pizzas', 'cp-n', 'cp-v')">Salvar Pizza</button>
        <div id="t-pizzas"></div>
    </div>
    <div id="s-bordas" class="content">
        <input id="cb-n" placeholder="Borda" autocomplete="off"><input type="number" id="cb-v" placeholder="Preço R$">
        <button class="btn btn-p" onclick="cad('bordas', 'cb-n', 'cb-v')">Salvar Borda</button>
        <div id="t-bordas"></div>
    </div>
    <div id="s-refris" class="content">
        <input id="cr-n" placeholder="Bebida" autocomplete="off"><input type="number" id="cr-v" placeholder="Preço R$">
        <button class="btn btn-p" onclick="cad('refris', 'cr-n', 'cr-v')">Salvar Bebida</button>
        <div id="t-refris"></div>
    </div>
    <div id="s-entregas" class="content">
        <input id="ce-n" placeholder="Bairro" autocomplete="off"><input type="number" id="ce-v" placeholder="Taxa R$">
        <button class="btn btn-p" onclick="cad('entregas', 'ce-n', 'ce-v')">Salvar Taxa</button>
        <div id="t-entregas"></div>
    </div>
</div>

<div class="footer-total">
    <div style="color:var(--sub); font-weight:bold;">TOTAL</div>
    <div class="total-price" id="display-total">R$ 0,00</div>
</div>

<datalist id="list-p"></datalist>
<datalist id="list-r"></datalist>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyALFZuwmpJkx-17PLTuxjWe_DnMpcLTkVM",
      authDomain: "gerador-15f2b.firebaseapp.com",
      databaseURL: "https://gerador-15f2b-default-rtdb.firebaseio.com",
      projectId: "gerador-15f2b",
      storageBucket: "gerador-15f2b.firebasestorage.app",
      messagingSenderId: "726615434458",
      appId: "1:726615434458:web:75eb6098391ec431b3f1e3"
    };

    firebase.initializeApp(firebaseConfig);
    const rdb = firebase.database();
    let db = { pizzas: {}, bordas: {}, refris: {}, entregas: {} };

    // Sincronização constante
    rdb.ref('pizzaria_folhari_final').on('value', snap => {
        const dados = snap.val();
        db = {
            pizzas: (dados && dados.pizzas) ? dados.pizzas : {},
            bordas: (dados && dados.bordas) ? dados.bordas : {},
            refris: (dados && dados.refris) ? dados.refris : {},
            entregas: (dados && dados.entregas) ? dados.entregas : {}
        };
        atualizarListas();
        calcularTotal();
    });

    function salvar() { rdb.ref('pizzaria_folhari_final').set(db); }

    function cad(categoria, idNome, idValor) {
        const nome = document.getElementById(idNome).value.trim();
        const valor = parseFloat(document.getElementById(idValor).value);
        if(!nome || isNaN(valor)) return alert("Preencha nome e valor corretamente!");
        
        db[categoria][nome] = valor;
        salvar();
        
        document.getElementById(idNome).value = '';
        document.getElementById(idValor).value = '';
    }

    function apagar(cat, item) {
        if(confirm(`Excluir ${item}?`)) {
            delete db[cat][item];
            salvar();
        }
    }

    function atualizarListas() {
        const categorias = ['pizzas', 'bordas', 'refris', 'entregas'];
        categorias.forEach(cat => {
            const container = document.getElementById(`t-${cat}`);
            const dl = (cat === 'pizzas') ? document.getElementById('list-p') : (cat === 'refris' ? document.getElementById('list-r') : null);
            
            if(container) container.innerHTML = '';
            if(dl) dl.innerHTML = '';
            if(cat === 'entregas') document.getElementById('p-taxa-bairro').innerHTML = '<option value="">Bairro...</option>';

            for(let item in db[cat]) {
                if(container) container.innerHTML += `<div class="card-item"><span>${item} (R$ ${db[cat][item].toFixed(2)})</span><span style="color:var(--p); font-weight:bold; cursor:pointer;" onclick="apagar('${cat}','${item}')">✕</span></div>`;
                if(dl) dl.innerHTML += `<option value="${item}">`;
                if(cat === 'entregas') document.getElementById('p-taxa-bairro').innerHTML += `<option value="${item}">${item}</option>`;
            }
        });
    }

    function calcularTotal() {
        const pCmd = document.getElementById('item_pizza').value;
        const rCmd = document.getElementById('item_refri').value;
        const tipo = document.getElementById('p-tipo').value;
        const bSel = document.querySelectorAll('.sel-borda-unidade');
        let total = 0; let idxB = 0;

        pCmd.split(',').forEach(p => {
            let t = p.trim(); if(!t) return;
            let q = 1; let n = t;
            const m = t.match(/^(\d+)\s*[xX]\s*(.*)/);
            if(m) { q = parseInt(m[1]); n = m[2].trim(); }
            let pReal = Object.keys(db.pizzas).find(k => k.toLowerCase() === n.toLowerCase());
            if(pReal) {
                for(let i = 0; i < q; i++) {
                    total += db.pizzas[pReal];
                    if(bSel[idxB] && bSel[idxB].value) total += db.bordas[bSel[idxB].value];
                    idxB++;
                }
            }
        });

        if(rCmd) {
            rCmd.split(',').forEach(r => {
                let t = r.trim(); if(!t) return;
                let q = 1; let n = t;
                const m = t.match(/^(\d+)\s*[xX]\s*(.*)/);
                if(m) { q = parseInt(m[1]); n = m[2].trim(); }
                let rReal = Object.keys(db.refris).find(k => k.toLowerCase() === n.toLowerCase());
                if(rReal) total += (db.refris[rReal] * q);
            });
        }

        if(tipo === 'entrega') {
            const b = document.getElementById('p-taxa-bairro').value;
            total += (db.entregas[b]) ? db.entregas[b] : 0;
        }

        document.getElementById('display-total').innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;
    }

    function atualizarBordas() {
        const cmd = document.getElementById('item_pizza').value;
        const container = document.getElementById('container-bordas');
        container.innerHTML = "";
        const partes = cmd.split(',');
        let html = '<div class="borda-box"><strong>Bordas:</strong>';
        let tem = false;

        partes.forEach(p => {
            let t = p.trim(); if(!t) return;
            let q = 1; let n = t;
            const m = t.match(/^(\d+)\s*[xX]\s*(.*)/);
            if(m) { q = parseInt(m[1]); n = m[2].trim(); }
            let pReal = Object.keys(db.pizzas).find(k => k.toLowerCase() === n.toLowerCase());
            if(pReal) {
                tem = true;
                for(let i = 1; i <= q; i++) {
                    html += `<div style="margin:5px 0;">${pReal} #${i}: <select class="sel-borda-unidade" onchange="calcularTotal()"><option value="">Sem Borda</option>${Object.keys(db.bordas).map(b => `<option value="${b}">${b}</option>`).join('')}</select></div>`;
                }
            }
        });
        if(tem) container.innerHTML = html + '</div>';
    }

    function lancarPedido() {
        const pCmd = document.getElementById('item_pizza').value;
        const rCmd = document.getElementById('item_refri').value;
        const cli = document.getElementById('id_cliente').value || "Não informado";
        const tipo = document.getElementById('p-tipo').value;
        const bSel = document.querySelectorAll('.sel-borda-unidade');
        const obs = document.getElementById('p-obs').value;
        let total = 0; let res = `*🍕 PIZZARIA FOLHARI*\n\n`;
        let idxB = 0;

        pCmd.split(',').forEach(p => {
            let t = p.trim(); if(!t) return;
            let q = 1; let n = t;
            const m = t.match(/^(\d+)\s*[xX]\s*(.*)/);
            if(m) { q = parseInt(m[1]); n = m[2].trim(); }
            let pReal = Object.keys(db.pizzas).find(k => k.toLowerCase() === n.toLowerCase());
            if(pReal) {
                for(let i = 0; i < q; i++) {
                    let v = db.pizzas[pReal]; let bTxt = "";
                    if(bSel[idxB] && bSel[idxB].value) { v += db.bordas[bSel[idxB].value]; bTxt = ` (Borda: ${bSel[idxB].value})`; }
                    total += v; res += `• 1x ${pReal}${bTxt} - R$ ${v.toFixed(2)}\n`; idxB++;
                }
            }
        });

        if(rCmd) {
            res += `\n*🥤 BEBIDAS:*\n`;
            rCmd.split(',').forEach(r => {
                let t = r.trim(); if(!t) return;
                let q = 1; let n = t;
                const m = t.match(/^(\d+)\s*[xX]\s*(.*)/);
                if(m) { q = parseInt(m[1]); n = m[2].trim(); }
                let rReal = Object.keys(db.refris).find(k => k.toLowerCase() === n.toLowerCase());
                if(rReal) { let v = db.refris[rReal] * q; total += v; res += `• ${q}x ${rReal} - R$ ${v.toFixed(2)}\n`; }
            });
        }

        if(tipo === 'entrega') {
            const b = document.getElementById('p-taxa-bairro').value;
            const tx = db.entregas[b] || 0;
            total += tx; res += `\n🛵 *Entrega:* ${b} (R$ ${tx.toFixed(2)})`;
        } else { res += `\n🏠 *Retirada*`; }

        if(obs) res += `\n\n📝 *Obs:* ${obs}`;
        res += `\n\n👤 *Cliente:* ${cli}\n💰 *TOTAL: R$ ${total.toFixed(2)}*`;

        const card = document.createElement('div'); card.className = 'card-item'; card.style.display = 'block';
        card.innerHTML = `<pre>${res}</pre><button class="btn btn-zap" onclick="window.open('https://api.whatsapp.com/send?text=${window.encodeURIComponent(res)}')">Enviar WhatsApp</button>`;
        document.getElementById('lista-pedidos').prepend(card);
    }

    function setor(e, id) {
        document.querySelectorAll('.content').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        e.currentTarget.classList.add('active');
    }
    function toggleEntrega() { document.getElementById('area-bairro').style.display = document.getElementById('p-tipo').value === 'local' ? 'none' : 'block'; }
</script>
</body>
        </html>
